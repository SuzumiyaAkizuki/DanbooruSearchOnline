name: Sync to HuggingFace Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "github-actions@github.com"
          git config user.name  "GitHub Actions"

          # 全局禁用 LFS，避免 fetch HF Space 时尝试下载大文件
          git lfs uninstall

          git remote add hf_space \
            https://user:${HF_TOKEN}@huggingface.co/spaces/SAkizuki/DanbooruSearch

          # 拉取 HF Space 当前状态（含缓存文件的 LFS 指针）
          git fetch hf_space main

          # 以 HF Space 为基础合并，代码冲突以 GitHub 版本为准
          git merge hf_space/main --allow-unrelated-histories -X theirs \
            -m "sync from GitHub"

          # 推回 HF Space
          git push hf_space main:main