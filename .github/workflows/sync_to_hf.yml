name: Sync to HuggingFace Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Upload code files to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - << 'PYEOF'
          import os
          from pathlib import Path
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "SAkizuki/DanbooruSearch"

          IGNORE_DIRS = {"tags_embedding", ".git", "__pycache__"}
          IGNORE_SUFFIX = {".pyc", ".parquet",".csv"}


          root = Path(".")
          for path in root.rglob("*"):
              if path.is_dir():
                  continue
              if set(path.parts) & IGNORE_DIRS:
                  continue
              if path.suffix in IGNORE_SUFFIX:
                  continue
              print(f"uploading: {path}")
              api.upload_file(
                  path_or_fileobj=str(path),
                  path_in_repo=str(path),
                  repo_id=repo_id,
                  repo_type="space",
              )
          print("done")
          PYEOF