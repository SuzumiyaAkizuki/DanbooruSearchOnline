name: Sync to HuggingFace Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GIT_LFS_SKIP_SMUDGE: 1    # 全局阻止 LFS smudge filter，fetch 时只拉指针不拉实际文件
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "github-actions@github.com"
          git config user.name  "GitHub Actions"

          git remote add hf_space \
            https://user:${HF_TOKEN}@huggingface.co/spaces/SAkizuki/DanbooruSearch

          # 拉取 HF Space（LFS 文件只拉指针，不下载实际内容）
          git fetch hf_space main

          # 以 HF Space 为基础合并，代码冲突以 GitHub 版本为准
          git merge hf_space/main --allow-unrelated-histories -X theirs \
            -m "sync from GitHub"

          # 推回 HF Space（LFS 指针原样保留，不触发上传）
          git push hf_space main:main